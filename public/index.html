<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sampaguita</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1D9E75" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-border:#5DCAA5;--green-text:#085041;
      --amber-light:#FAEEDA;--amber-border:#EF9F27;--amber-text:#633806;
      --blue-light:#E6F1FB;--blue-border:#85B7EB;--blue-text:#0C447C;
      --xp:#7F77DD;
      --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#F0EFE9;
      --border:rgba(0,0,0,0.07);--border-md:rgba(0,0,0,0.12);
      --text:#1a1a18;--text-muted:#6b6b67;--text-hint:#a0a09c;
      --radius:14px;--radius-sm:9px;--radius-xs:6px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#161614;--surface:#1e1e1c;--surface2:#252523;
      --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);
      --text:#f0efe9;--text-muted:#9a9a96;--text-hint:#6b6b67;
      --green-light:#0a2e22;--green-border:#1D9E75;--green-text:#9FE1CB;
      --amber-light:#2a1a05;--amber-border:#854F0B;--amber-text:#FAC775;
      --blue-light:#071828;--blue-border:#185FA5;--blue-text:#85B7EB;
    }}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
    .app{max-width:460px;margin:0 auto;padding:1.25rem 1rem 4rem;}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
    .logo{font-size:16px;font-weight:700;color:var(--green);letter-spacing:-0.02em;}
    .lang-toggle{display:flex;border:0.5px solid var(--border-md);border-radius:var(--radius-xs);overflow:hidden;}
    .lang-toggle button{padding:4px 10px;font-size:11px;font-weight:600;background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:all 0.15s;}
    .lang-toggle button.active{background:var(--surface);color:var(--text);}

    .level-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.125rem;margin-bottom:0.875rem;}
    .level-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .level-badge{display:flex;align-items:center;gap:8px;}
    .level-icon{width:34px;height:34px;border-radius:50%;background:var(--xp);display:flex;align-items:center;justify-content:center;font-size:16px;}
    .level-name{font-size:13px;font-weight:600;color:var(--text);}
    .level-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
    .xp-label{font-size:12px;font-weight:700;color:var(--xp);}
    .xp-bar-wrap{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
    .xp-bar{height:100%;background:var(--xp);border-radius:99px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1);}
    .xp-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--xp);color:white;font-size:13px;font-weight:700;padding:8px 20px;border-radius:99px;z-index:100;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
    .xp-toast.show{transform:translateX(-50%) translateY(0);}

    .mission-card{border-radius:var(--radius);padding:0.875rem 1rem;margin-bottom:0.875rem;border:0.5px solid var(--green-border);background:var(--green-light);}
    .mission-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
    .mission-label{font-size:10px;font-weight:700;color:var(--green-text);text-transform:uppercase;letter-spacing:0.06em;}
    .mission-timer{font-size:11px;font-weight:600;color:var(--green-text);opacity:0.65;}
    .mission-title{font-size:14px;font-weight:600;color:var(--green-text);margin-bottom:8px;line-height:1.4;}
    .mission-bar-wrap{height:5px;background:rgba(0,0,0,0.1);border-radius:99px;overflow:hidden;margin-bottom:6px;}
    .mission-bar{height:100%;background:var(--green);border-radius:99px;transition:width 0.5s ease;}
    .mission-footer{display:flex;justify-content:space-between;}
    .mission-pct{font-size:11px;font-weight:700;color:var(--green-text);}
    .mission-xp-label{font-size:11px;color:var(--green-text);opacity:0.65;}
    .mission-complete{background:var(--green);border-radius:var(--radius);padding:0.875rem 1rem;margin-bottom:0.875rem;display:flex;align-items:center;gap:10px;animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);}
    .mission-complete-title{font-size:14px;font-weight:700;color:white;}
    .mission-complete-sub{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;}
    .new-mission-btn{margin-left:auto;padding:6px 12px;font-size:12px;font-weight:600;font-family:inherit;background:rgba(255,255,255,0.2);border:none;color:white;border-radius:var(--radius-xs);cursor:pointer;white-space:nowrap;}
    @keyframes popIn{from{transform:scale(0.92);opacity:0;}to{transform:scale(1);opacity:1;}}

    .nudge{border-radius:var(--radius-sm);padding:0.75rem 0.875rem;margin-bottom:0.75rem;display:none;align-items:flex-start;gap:9px;animation:slideDown 0.25s ease;}
    .nudge.show{display:flex;}
    .nudge.upsell{background:var(--green-light);border:0.5px solid var(--green-border);}
    .nudge.tip{background:var(--amber-light);border:0.5px solid var(--amber-border);}
    .nudge.advisor{background:var(--blue-light);border:0.5px solid var(--blue-border);}
    .nudge-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
    .nudge-body{font-size:13px;line-height:1.55;flex:1;}
    .nudge.upsell .nudge-body{color:var(--green-text);}
    .nudge.tip .nudge-body{color:var(--amber-text);}
    .nudge.advisor .nudge-body{color:var(--blue-text);}
    .nudge-close{background:none;border:none;cursor:pointer;font-size:12px;padding:0 0 0 6px;opacity:0.4;color:var(--text);}
    @keyframes slideDown{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}

    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.125rem;margin-bottom:0.875rem;}
    .form-row{display:flex;gap:8px;margin-bottom:8px;}
    .form-row:last-child{margin-bottom:0;}
    .field{flex:1;}
    .field label{font-size:10px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
    .field input{width:100%;height:38px;padding:0 10px;border:0.5px solid var(--border-md);border-radius:var(--radius-xs);background:var(--surface2);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s;}
    .field input:focus{border-color:var(--green);background:var(--surface);}
    .field input::placeholder{color:var(--text-hint);}
    .add-btn{height:38px;padding:0 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-radius:var(--radius-xs);background:var(--green);border:none;color:white;white-space:nowrap;transition:background 0.15s,transform 0.1s;}
    .add-btn:hover{background:var(--green-dark);}
    .add-btn:active{transform:scale(0.96);}

    .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:0.875rem;}
    .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 0.875rem;}
    .stat-label{font-size:10px;font-weight:700;color:var(--text-hint);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
    .stat-value{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-0.02em;}

    .sale-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);}
    .sale-item:last-child{border-bottom:none;}
    .sale-desc{font-size:13px;font-weight:500;color:var(--text);}
    .sale-time{font-size:11px;color:var(--text-hint);margin-top:1px;}
    .sale-amount{font-size:14px;font-weight:700;color:var(--green);}
    .del-btn{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:12px;padding:4px 0 4px 10px;opacity:0.35;}
    .del-btn:hover{opacity:1;}
    .empty{text-align:center;padding:1.75rem 0;color:var(--text-hint);font-size:13px;}

    .advice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
    .advice-title{font-size:13px;font-weight:700;color:var(--text);}
    .tips-btn{padding:5px 11px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border-radius:var(--radius-xs);background:transparent;border:0.5px solid var(--border-md);color:var(--text);transition:background 0.15s;}
    .tips-btn:hover{background:var(--surface2);}
    .tips-btn:disabled{opacity:0.35;cursor:default;}
    .advice-body{font-size:13px;line-height:1.75;color:var(--text-muted);white-space:pre-line;}
    .advice-body.loading{font-style:italic;color:var(--text-hint);}
    .start-mission-btn{padding:6px 14px;font-size:12px;font-weight:600;font-family:inherit;background:var(--green);color:white;border:none;border-radius:var(--radius-xs);cursor:pointer;margin-top:10px;}
  </style>
</head>
<body>
<div class="xp-toast" id="xp-toast"></div>
<div class="app">
  <div class="header">
    <div class="logo">sampaguita</div>
    <div class="lang-toggle">
      <button class="active" onclick="setLang('en',this)">English</button>
      <button onclick="setLang('fil',this)">Filipino</button>
    </div>
  </div>

  <div class="level-card">
    <div class="level-row">
      <div class="level-badge">
        <div class="level-icon" id="level-icon">⭐</div>
        <div>
          <div class="level-name" id="level-name">Level 1 — Starter</div>
          <div class="level-sub" id="level-sub">Keep logging to level up</div>
        </div>
      </div>
      <div class="xp-label" id="xp-label">0 XP</div>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
  </div>

  <div id="mission-slot"></div>

  <div class="nudge advisor" id="nudge-advisor">
    <div class="nudge-icon">🤝</div>
    <div class="nudge-body" id="nudge-advisor-text"></div>
    <button class="nudge-close" onclick="closeNudge('advisor')">✕</button>
  </div>
  <div class="nudge upsell" id="nudge-upsell">
    <div class="nudge-icon">💬</div>
    <div class="nudge-body" id="nudge-upsell-text"></div>
    <button class="nudge-close" onclick="closeNudge('upsell')">✕</button>
  </div>
  <div class="nudge tip" id="nudge-tip">
    <div class="nudge-icon">💡</div>
    <div class="nudge-body" id="nudge-tip-text"></div>
    <button class="nudge-close" onclick="closeNudge('tip')">✕</button>
  </div>

  <div class="card">
    <div class="form-row">
      <div class="field" style="flex:2;">
        <label id="lbl-desc">What did you sell?</label>
        <input type="text" id="input-desc" placeholder="e.g. Sinigang, 1 order" />
      </div>
      <div class="field">
        <label id="lbl-amount">Amount (₱)</label>
        <input type="number" id="input-amount" placeholder="150" min="0" />
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label id="lbl-time">Time</label>
        <input type="time" id="input-time" />
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="add-btn" id="add-btn" onclick="addSale()">+ Log sale</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label" id="lbl-total">Today's total</div><div class="stat-value" id="stat-total">₱0</div></div>
    <div class="stat"><div class="stat-label" id="lbl-count">Sales</div><div class="stat-value" id="stat-count">0</div></div>
    <div class="stat"><div class="stat-label" id="lbl-avg">Avg. sale</div><div class="stat-value" id="stat-avg">₱0</div></div>
  </div>

  <div class="card" id="sales-list">
    <div class="empty" id="empty-msg">No sales yet. Log your first one above.</div>
  </div>

  <div class="card">
    <div class="advice-header">
      <div class="advice-title" id="lbl-coach">24/7 Business Advisor</div>
      <button class="tips-btn" id="tips-btn" onclick="getAdvice()">Ask advisor ↗</button>
    </div>
    <div class="advice-body" id="advice-body">Log a few sales and I'll give you specific tips to grow your business today.</div>
  </div>
</div>

<script>
var T={en:{desc:'What did you sell?',amount:'Amount (₱)',time:'Time',addBtn:'+ Log sale',total:"Today's total",count:'Sales',avg:'Avg. sale',coach:'24/7 Business Advisor',tipsBtn:'Ask advisor ↗',empty:'No sales yet. Log your first one above.',placeholder:"Log a few sales and I'll give you specific tips to grow your business today.",loading:'Your advisor is thinking...',noSales:'Log at least one sale first.',ph2:'e.g. Sinigang, 1 order',missionComplete:'Mission complete!',newMission:'New mission',startMission:'Start a mission',noMission:'No active mission. Start one to earn XP.',upsells:['Did you ask if they wanted anything else?','Offer a drink or dessert on the side?','Great sale! Did you mention your other items?','Did you let them know your bestsellers?','Before they left — offer something extra?','Would they like to add something for a little more?','Tell them about any promos today?'],tips:['Slow moment? Post a quick promo on Facebook right now.','Try a bundle: 2 popular items at a slightly lower combined price.','A loyalty card (buy 5, get 1 free) turns buyers into regulars.','Near closing with leftover stock? Offer a small discount.','Ask your next customer how they found you.','Photo your bestseller and post it. 30 seconds.'],missions:[{title:'Sell ₱500 in the next hour',target:500,type:'amount',duration:60,xp:50},{title:'Sell ₱1,000 in the next 2 hours',target:1000,type:'amount',duration:120,xp:100},{title:'Log 5 sales in the next hour',target:5,type:'count',duration:60,xp:60},{title:'Log 3 sales in the next 30 minutes',target:3,type:'count',duration:30,xp:40},{title:'Reach ₱2,000 total today',target:2000,type:'total',duration:null,xp:120},{title:'Log 10 sales today',target:10,type:'count',duration:null,xp:80},{title:'Sell ₱300 in the next 30 minutes',target:300,type:'amount',duration:30,xp:35}],levels:[{name:'Starter',sub:'Keep logging to level up',icon:'⭐',xp:0},{name:'Hustler',sub:"You're building momentum",icon:'🔥',xp:100},{name:'Grinder',sub:'Sales are becoming a habit',icon:'⚡',xp:250},{name:'Pro Seller',sub:'You know how to move product',icon:'💪',xp:500},{name:'Top Earner',sub:"You're in the top tier",icon:'🏆',xp:1000},{name:'Legend',sub:'The community looks up to you',icon:'👑',xp:2000}],greetings:{morning:"Good morning! Ready for a great day? Start a mission and let's go. 💪",afternoon:"Good afternoon! How are sales going? Log your last sale and I'll help you push harder.",evening:"Good evening! Evening customers can be your most loyal ones. Keep going!"}},fil:{desc:'Ano ang nabenta mo?',amount:'Halaga (₱)',time:'Oras',addBtn:'+ I-log',total:'Kabuuan ngayon',count:'Mga benta',avg:'Katamtaman',coach:'24/7 Business Advisor',tipsBtn:'Tanungin ↗',empty:'Wala pang benta. I-log ang una mo sa itaas.',placeholder:'Mag-log ng ilang benta at bibigyan kita ng mga tips para palaguin ang negosyo.',loading:'Nag-iisip ang iyong advisor...',noSales:'Mag-log muna ng isang benta.',ph2:'hal. Sinigang, 1 order',missionComplete:'Natapos ang mission!',newMission:'Bagong mission',startMission:'Magsimula ng mission',noMission:'Walang aktibong mission. Magsimula para kumita ng XP.',upsells:['Nagtanong ka ba kung gusto nila ng ibang pagkain?','Nag-alok ka ba ng inumin o dessert?','Magandang benta! Naipakilala mo ba ang iyong ibang produkto?','Sinabi mo ba sa kanila ang iyong mga bestseller?','Bago sila umalis — nag-alok ka ba ng dagdag?','Gusto ba nilang magdagdag ng kaunti?','Sinabi mo ba sa kanila ang iyong mga promo ngayon?'],tips:['Tahimik ngayon? Mag-post ng promo sa Facebook ngayon.','Subukan ang bundle: 2 popular na item sa mas mababang presyo.','Ang loyalty card ay nagbibigay ng dahilan para bumalik.','Malapit nang magsara at may natira? Mag-alok ng diskwento.','Tanungin ang susunod na customer kung paano ka nila nalaman.','Kumuha ng litrato ng bestseller mo at i-post. 30 segundo.'],missions:[{title:'Magbenta ng ₱500 sa susunod na isang oras',target:500,type:'amount',duration:60,xp:50},{title:'Magbenta ng ₱1,000 sa susunod na 2 oras',target:1000,type:'amount',duration:120,xp:100},{title:'Mag-log ng 5 benta sa susunod na isang oras',target:5,type:'count',duration:60,xp:60},{title:'Mag-log ng 3 benta sa susunod na 30 minuto',target:3,type:'count',duration:30,xp:40},{title:'Maabot ang ₱2,000 kabuuan ngayon',target:2000,type:'total',duration:null,xp:120},{title:'Mag-log ng 10 benta ngayon',target:10,type:'count',duration:null,xp:80},{title:'Magbenta ng ₱300 sa susunod na 30 minuto',target:300,type:'amount',duration:30,xp:35}],levels:[{name:'Simula',sub:'Patuloy na mag-log para mag-level up',icon:'⭐',xp:0},{name:'Hustler',sub:'Nagtatayo ka ng momentum',icon:'🔥',xp:100},{name:'Grinder',sub:'Naging ugali na ang pagbebenta',icon:'⚡',xp:250},{name:'Pro Seller',sub:'Alam mo na kung paano magbenta',icon:'💪',xp:500},{name:'Top Earner',sub:'Nasa pinakamataas ka na',icon:'🏆',xp:1000},{name:'Alamat',sub:'Hinahangaan ka ng komunidad',icon:'👑',xp:2000}],greetings:{morning:'Magandang umaga! Handa ka na ba? Magsimula ng mission at sige na. 💪',afternoon:'Magandang hapon! Kumusta ang benta? I-log ang huling benta mo.',evening:'Magandang gabi! Ang mga customer sa gabi ay kadalasang tapat. Tuloy lang!'}}};

var lang='en',sales=[],saleCount=0,totalXP=0,currentLevel=0,mission=null,missionStartTotal=0,missionStartCount=0,missionCompleted=false,missionSecondsLeft=0,missionTimerInterval=null;

function setLang(l,btn){lang=l;document.querySelectorAll('.lang-toggle button').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');applyLabels();}
function applyLabels(){var L=T[lang];document.getElementById('lbl-desc').textContent=L.desc;document.getElementById('lbl-amount').textContent=L.amount;document.getElementById('lbl-time').textContent=L.time;document.getElementById('add-btn').textContent=L.addBtn;document.getElementById('lbl-total').textContent=L.total;document.getElementById('lbl-count').textContent=L.count;document.getElementById('lbl-avg').textContent=L.avg;document.getElementById('lbl-coach').textContent=L.coach;document.getElementById('tips-btn').textContent=L.tipsBtn;document.getElementById('input-desc').placeholder=L.ph2;if(sales.length===0){var em=document.getElementById('empty-msg');if(em)em.textContent=L.empty;document.getElementById('advice-body').textContent=L.placeholder;}}

function nowTime(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
document.getElementById('input-time').value=nowTime();
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function closeNudge(t){document.getElementById('nudge-'+t).classList.remove('show');}
function showNudge(t,txt){closeNudge(t);document.getElementById('nudge-'+t+'-text').textContent=txt;setTimeout(function(){document.getElementById('nudge-'+t).classList.add('show');},40);}

function showXPToast(msg){var el=document.getElementById('xp-toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}

function addXP(amount){totalXP+=amount;var prev=currentLevel;var levels=T[lang].levels;for(var i=levels.length-1;i>=0;i--){if(totalXP>=levels[i].xp){currentLevel=i;break;}}if(currentLevel>prev){showXPToast('Level up! Level '+(currentLevel+1)+' — '+T[lang].levels[currentLevel].name+' 🎉');}else{showXPToast('+'+amount+' XP');}renderLevel();}

function renderLevel(){var levels=T[lang].levels;var lvl=levels[currentLevel];var next=levels[currentLevel+1];var base=lvl.xp;var cap=next?next.xp:base+500;var pct=next?Math.min(100,((totalXP-base)/(cap-base))*100):100;document.getElementById('level-icon').textContent=lvl.icon;document.getElementById('level-name').textContent='Level '+(currentLevel+1)+' — '+lvl.name;document.getElementById('level-sub').textContent=lvl.sub;document.getElementById('xp-label').textContent=totalXP+' XP';document.getElementById('xp-bar').style.width=pct+'%';}

function getMissionProgress(){if(!mission)return 0;var total=sales.reduce(function(s,x){return s+x.amount;},0);if(mission.type==='amount')return total-missionStartTotal;if(mission.type==='count')return sales.length-missionStartCount;if(mission.type==='total')return total;return 0;}

function startMission(m){mission=m;missionCompleted=false;missionStartTotal=sales.reduce(function(s,x){return s+x.amount;},0);missionStartCount=sales.length;if(missionTimerInterval)clearInterval(missionTimerInterval);if(m.duration){missionSecondsLeft=m.duration*60;missionTimerInterval=setInterval(function(){missionSecondsLeft--;if(missionSecondsLeft<=0){clearInterval(missionTimerInterval);if(!missionCompleted)renderMissionExpired();}else{renderMission();}},1000);}renderMission();}

function renderMission(){var slot=document.getElementById('mission-slot');if(!mission){slot.innerHTML='<div class="mission-card"><div class="mission-top"><div class="mission-label">'+(lang==='en'?'Mission':'Mission')+'</div></div><div class="mission-title" style="font-size:13px;opacity:0.65;margin-bottom:10px;">'+T[lang].noMission+'</div><button class="start-mission-btn" onclick="startMission(pick(T[lang].missions))">'+T[lang].startMission+'</button></div>';return;}var progress=getMissionProgress();var pct=Math.min(100,(progress/mission.target)*100);var timerStr='';if(mission.duration&&missionSecondsLeft>0){var m=Math.floor(missionSecondsLeft/60);var s=missionSecondsLeft%60;timerStr=m+':'+(s<10?'0':'')+s+' left';}slot.innerHTML='<div class="mission-card"><div class="mission-top"><div class="mission-label">'+(lang==='en'?'Active Mission':'Aktibong Mission')+'</div>'+(timerStr?'<div class="mission-timer">'+timerStr+'</div>':'')+'</div><div class="mission-title">'+mission.title+'</div><div class="mission-bar-wrap"><div class="mission-bar" style="width:'+pct+'%"></div></div><div class="mission-footer"><div class="mission-pct">'+Math.round(pct)+'% '+(lang==='en'?'complete':'tapos')+'</div><div class="mission-xp-label">+'+mission.xp+' XP reward</div></div></div>';}

function renderMissionExpired(){var slot=document.getElementById('mission-slot');slot.innerHTML='<div class="mission-card" style="opacity:0.6;"><div class="mission-label">'+(lang==='en'?'Mission expired':'Nag-expire ang mission')+'</div><div class="mission-title" style="font-size:13px;margin:6px 0 10px;">'+mission.title+'</div><button class="start-mission-btn" onclick="mission=null;startMission(pick(T[lang].missions))">'+T[lang].newMission+'</button></div>';}

function checkMissionComplete(){if(!mission||missionCompleted)return;var progress=getMissionProgress();if(progress>=mission.target){missionCompleted=true;if(missionTimerInterval)clearInterval(missionTimerInterval);var earned=mission.xp;var mTitle=mission.title;addXP(earned);var slot=document.getElementById('mission-slot');slot.innerHTML='<div class="mission-complete"><div><div class="mission-complete-title">'+T[lang].missionComplete+'</div><div class="mission-complete-sub">'+mTitle+'</div></div><button class="new-mission-btn" onclick="mission=null;startMission(pick(T[lang].missions))">'+T[lang].newMission+'</button></div>';setTimeout(function(){if(missionCompleted){mission=null;startMission(pick(T[lang].missions));}},5000);}}

function addSale(){var desc=document.getElementById('input-desc').value.trim();var amount=parseFloat(document.getElementById('input-amount').value);var time=document.getElementById('input-time').value||nowTime();if(!desc||isNaN(amount)||amount<=0)return;sales.push({desc:desc,amount:amount,time:time,id:Date.now()});saleCount++;document.getElementById('input-desc').value='';document.getElementById('input-amount').value='';document.getElementById('input-time').value=nowTime();addXP(10);closeNudge('upsell');closeNudge('tip');showNudge('upsell',pick(T[lang].upsells));if(saleCount%3===0)setTimeout(function(){showNudge('tip',pick(T[lang].tips));},700);var total=sales.reduce(function(s,x){return s+x.amount;},0);if(saleCount===5)setTimeout(function(){showNudge('advisor',lang==='en'?'5 sales logged! You\'re building a great habit. Try offering a bundle on your next customer.':'5 benta na! Nagtatayo ka ng magandang gawi. Subukan ang bundle sa susunod na customer.');},1200);if(total>=1000&&total-amount<1000)setTimeout(function(){showNudge('advisor',lang==='en'?'₱1,000 milestone! 🎉 Can you double it before closing?':'₱1,000 na! 🎉 Kaya mo bang i-doble bago magsara?');},1200);checkMissionComplete();render();}

document.getElementById('input-amount').addEventListener('keydown',function(e){if(e.key==='Enter')addSale();});

function deleteSale(id){sales=sales.filter(function(s){return s.id!==id;});render();}

function render(){var total=sales.reduce(function(s,x){return s+x.amount;},0);var avg=sales.length?total/sales.length:0;document.getElementById('stat-total').textContent='₱'+Math.round(total).toLocaleString();document.getElementById('stat-count').textContent=sales.length;document.getElementById('stat-avg').textContent='₱'+Math.round(avg).toLocaleString();var list=document.getElementById('sales-list');if(sales.length===0){list.innerHTML='<div class="empty" id="empty-msg">'+T[lang].empty+'</div>';return;}list.innerHTML=[...sales].reverse().map(function(s){return'<div class="sale-item"><div><div class="sale-desc">'+s.desc+'</div><div class="sale-time">'+s.time+'</div></div><div style="display:flex;align-items:center;"><span class="sale-amount">₱'+Math.round(s.amount).toLocaleString()+'</span><button class="del-btn" onclick="deleteSale('+s.id+')">✕</button></div></div>';}).join('');renderMission();}

async function getAdvice(){if(!sales.length){document.getElementById('advice-body').textContent=T[lang].noSales;return;}var btn=document.getElementById('tips-btn');var el=document.getElementById('advice-body');btn.disabled=true;el.textContent=T[lang].loading;el.className='advice-body loading';var total=sales.reduce(function(s,x){return s+x.amount;},0);var avg=total/sales.length;var items=sales.map(function(s){return s.time+' – '+s.desc+': ₱'+s.amount;}).join('\n');var levelName=T[lang].levels[currentLevel].name;var langInstr=lang==='fil'?'Respond in Filipino (Tagalog).':'Respond in English.';var prompt='You are a 24/7 business advisor for small business owners in the Philippines. '+langInstr+'\n\nThe owner is Level '+(currentLevel+1)+' ('+levelName+') with '+totalXP+' XP.\n\nToday\'s sales:\n'+items+'\n\nTotal: ₱'+Math.round(total).toLocaleString()+' | Sales: '+sales.length+' | Avg: ₱'+Math.round(avg).toLocaleString()+'\n\nGive 3 short, specific, actionable tips to grow their business RIGHT NOW. Base them on the actual items and timing. Include at least one of: a promo idea, bundle suggestion, upsell script, or social media post idea. Be like a trusted friend — direct, warm, concrete. Each tip is 1-2 sentences. Separate with a blank line. No numbering, bullets, or headers.';try{var res=await fetch('/api/advice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:prompt})});var data=await res.json();el.textContent=data.text||'Could not load tips. Try again.';el.className='advice-body';addXP(5);}catch(e){el.textContent='Something went wrong. Please try again.';el.className='advice-body';}btn.disabled=false;}

function showGreeting(){var h=new Date().getHours();var g=T[lang].greetings;var msg=h<12?g.morning:h<18?g.afternoon:g.evening;showNudge('advisor',msg);}

renderLevel();
startMission(pick(T[lang].missions));
setTimeout(showGreeting,800);
</script>
